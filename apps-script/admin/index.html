<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Admin — Loja & Agenda Simples</title>
</head>
<body class="bg-slate-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold">Admin — Loja & Agenda Simples</h1>
        <p class="text-slate-500">Gerar clientes, confirmar pagamentos e controlar acessos.</p>
      </div>
      <button onclick="carregarClientes()" class="bg-slate-900 text-white px-4 py-3 rounded-xl font-bold">Atualizar</button>
    </div>

    <div class="grid lg:grid-cols-2 gap-6 mb-8">
      <section class="bg-white rounded-2xl p-6 shadow-sm border">
        <h2 class="text-xl font-bold mb-5">Novo cliente</h2>

        <div class="space-y-3">
          <input id="nomeEmpresa" class="input" placeholder="Nome da loja/negócio">
          <select id="tipo" class="input">
            <option value="LOJA">Loja / Vendedor de produtos</option>
            <option value="SERVICO">Prestador de serviço</option>
          </select>
          <input id="responsavel" class="input" placeholder="Nome do responsável">
          <input id="telefone" class="input" placeholder="WhatsApp">
          <input id="email" class="input" placeholder="E-mail (opcional)">
          <input id="usuario" class="input" placeholder="Usuário">
          <input id="senhaTemporaria" class="input" placeholder="Senha temporária">
          <input id="vendedor" class="input" placeholder="Vendedor">
          <input id="vencimento" type="date" class="input">
        </div>

        <button onclick="criarCliente()" class="mt-5 bg-slate-900 text-white px-4 py-3 rounded-xl font-bold w-full">
          Gerar sistema do cliente
        </button>

        <div id="resultadoNovoCliente" class="mt-5 text-sm"></div>
      </section>

      <section class="bg-white rounded-2xl p-6 shadow-sm border">
        <h2 class="text-xl font-bold mb-5">Confirmar pagamentos por lista</h2>
        <p class="text-slate-500 text-sm mb-3">Cole um ID de cliente por linha.</p>
        <textarea id="txtPagamentos" class="input h-48" placeholder="loja-maria&#10;ana-manicure"></textarea>
        <button onclick="processarTxt()" class="mt-5 bg-emerald-700 text-white px-4 py-3 rounded-xl font-bold w-full">
          Confirmar pagamentos da lista
        </button>
        <div id="resultadoTxt" class="mt-5 text-sm"></div>
      </section>
    </div>

    <section class="bg-white rounded-2xl p-6 shadow-sm border">
      <h2 class="text-xl font-bold mb-5">Clientes</h2>
      <div class="overflow-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b text-left">
              <th class="py-3">ID</th>
              <th>Empresa</th>
              <th>Tipo</th>
              <th>Status</th>
              <th>Vencimento</th>
              <th>Vendedor</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="clientesTable"></tbody>
        </table>
      </div>
    </section>
  </div>

  <style>
    .input{
      width:100%;
      border:1px solid #cbd5e1;
      border-radius:14px;
      padding:12px 14px;
      outline:none;
    }
    .input:focus{
      border-color:#0f172a;
      box-shadow:0 0 0 4px rgba(15,23,42,.08);
    }
  </style>

  <script>
    window.onload = carregarClientes;

    function criarCliente(){
      const payload = {
        nomeEmpresa: nomeEmpresa.value,
        tipo: tipo.value,
        responsavel: responsavel.value,
        telefone: telefone.value,
        email: email.value,
        usuario: usuario.value,
        senhaTemporaria: senhaTemporaria.value,
        vendedor: vendedor.value,
        vencimento: vencimento.value
      };

      google.script.run
        .withSuccessHandler((res)=>{
          resultadoNovoCliente.innerHTML = `
            <div class="p-4 rounded-xl bg-emerald-50 border border-emerald-200">
              <b>Cliente criado!</b><br>
              ID: ${res.clienteId}<br>
              Usuário: ${res.usuario}<br>
              Senha temporária: ${res.senhaTemporaria}<br>
              <a class="text-blue-700 underline" href="${res.linkApp}" target="_blank">Abrir sistema</a>
            </div>
          `;
          carregarClientes();
        })
        .withFailureHandler((e)=>{
          resultadoNovoCliente.innerHTML = `<div class="p-4 rounded-xl bg-red-50 border border-red-200">${e.message}</div>`;
        })
        .criarCliente(payload);
    }

    function carregarClientes(){
      google.script.run
        .withSuccessHandler(renderClientes)
        .getClientes();
    }

    function renderClientes(clientes){
      clientesTable.innerHTML = '';

      clientes.forEach(c=>{
        clientesTable.innerHTML += `
          <tr class="border-b">
            <td class="py-3 font-mono">${c.id}</td>
            <td>${c.nomeEmpresa}</td>
            <td>${c.tipo}</td>
            <td>${badge(c.status)}</td>
            <td>${c.vencimento || '-'}</td>
            <td>${c.vendedor || '-'}</td>
            <td class="space-x-2 whitespace-nowrap">
              <button onclick="confirmar('${c.id}')" class="px-3 py-2 rounded-lg bg-emerald-700 text-white">Pago</button>
              <button onclick="bloquear('${c.id}')" class="px-3 py-2 rounded-lg bg-red-700 text-white">Bloquear</button>
              <button onclick="ativar('${c.id}')" class="px-3 py-2 rounded-lg bg-slate-700 text-white">Ativar</button>
              <a href="${c.linkApp}" target="_blank" class="px-3 py-2 rounded-lg bg-blue-700 text-white inline-block">Abrir</a>
            </td>
          </tr>
        `;
      });
    }

    function badge(status){
      const s = String(status || '').toUpperCase();
      if(s === 'ATIVO') return '<span class="px-2 py-1 rounded-full bg-emerald-100 text-emerald-700 font-bold">ATIVO</span>';
      if(s === 'BLOQUEADO') return '<span class="px-2 py-1 rounded-full bg-red-100 text-red-700 font-bold">BLOQUEADO</span>';
      return `<span class="px-2 py-1 rounded-full bg-slate-100 text-slate-700 font-bold">${s}</span>`;
    }

    function confirmar(id){
      google.script.run
        .withSuccessHandler(carregarClientes)
        .withFailureHandler(e=>alert(e.message))
        .confirmarPagamento(id);
    }

    function bloquear(id){
      google.script.run
        .withSuccessHandler(carregarClientes)
        .withFailureHandler(e=>alert(e.message))
        .bloquearCliente(id);
    }

    function ativar(id){
      google.script.run
        .withSuccessHandler(carregarClientes)
        .withFailureHandler(e=>alert(e.message))
        .ativarCliente(id);
    }

    function processarTxt(){
      google.script.run
        .withSuccessHandler((res)=>{
          resultadoTxt.innerHTML = res.map(r=>`${r.clienteId}: ${r.status}${r.erro ? ' - ' + r.erro : ''}`).join('<br>');
          carregarClientes();
        })
        .withFailureHandler(e=>alert(e.message))
        .processarPagamentosTxt(txtPagamentos.value);
    }
  </script>
</body>
</html>
